<!-- ============================================================
     Animations Engine (inline from huashu-design assets/animations.jsx)
     Stage + Sprite + useTime + useSprite + Easing + interpolate
     ============================================================ -->
<script>
(function() {
  const { createContext, useContext, useState, useEffect, useRef, useCallback } = React;

  const TimeContext = createContext({ time: 0, duration: 10, playing: false });
  const SpriteContext = createContext(null);

  const Easing = {
    linear: t => t,
    easeIn: t => t * t,
    easeOut: t => 1 - (1 - t) * (1 - t),
    easeInOut: t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2,
    expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
    overshoot: t => {
      const c1 = 1.70158, c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    },
    spring: t => {
      const c = (2 * Math.PI) / 3;
      return t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c) + 1;
    },
  };

  function interpolate(t, input, output, easing) {
    const [inStart, inEnd] = input;
    const [outStart, outEnd] = output;
    if (t <= inStart) return outStart;
    if (t >= inEnd) return outEnd;
    let progress = (t - inStart) / (inEnd - inStart);
    if (easing) progress = easing(progress);
    return outStart + (outEnd - outStart) * progress;
  }

  function useTime() { return useContext(TimeContext).time; }
  function useSprite() {
    const s = useContext(SpriteContext);
    return s || { t: 0, elapsed: 0, duration: 0 };
  }

  function Stage({ duration = 10, width = 1920, height = 1080, loop = true, children, bgColor = '#000' }) {
    const [time, setTime] = useState(0);
    const [playing, setPlaying] = useState(true);
    const [scale, setScale] = useState(1);
    const rafRef = useRef(null);

    // 錄影時強制 loop=false（render-video.js 注入 window.__recording=true）
    const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : loop;

    useEffect(() => {
      function updateScale() {
        const vw = window.innerWidth;
        const vh = window.innerHeight - 56;
        const s = Math.min(vw / width, vh / height);
        setScale(s);
      }
      updateScale();
      window.addEventListener('resize', updateScale);
      return () => window.removeEventListener('resize', updateScale);
    }, [width, height]);

    useEffect(() => {
      if (!playing) return;
      let cancelled = false;
      let last = null;

      function tick(now) {
        if (cancelled) return;
        if (last === null) {
          last = now;
          if (typeof window !== 'undefined') window.__ready = true;
        }
        const delta = (now - last) / 1000;
        last = now;
        setTime(prev => {
          const next = prev + delta;
          if (next >= duration) return effectiveLoop ? 0 : duration - 0.001;
          return next;
        });
        rafRef.current = requestAnimationFrame(tick);
      }

      const startAfterFonts = () => {
        if (cancelled) return;
        rafRef.current = requestAnimationFrame(tick);
      };
      if (typeof document !== 'undefined' && document.fonts && document.fonts.ready) {
        document.fonts.ready.then(startAfterFonts);
      } else {
        startAfterFonts();
      }

      return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
    }, [playing, duration, effectiveLoop]);

    const handleScrub = useCallback((e) => {
      const rect = e.currentTarget.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      setTime(Math.max(0, Math.min(duration, ratio * duration)));
    }, [duration]);

    const handleSeek = useCallback((e) => {
      handleScrub(e);
      setPlaying(false);
    }, [handleScrub]);

    const progress = time / duration;

    return React.createElement(TimeContext.Provider, { value: { time, duration, playing, setPlaying, setTime } },
      React.createElement('div', {
        style: {
          position: 'fixed', inset: 0, background: '#000',
          display: 'flex', flexDirection: 'column',
          fontFamily: 'Noto Sans TC, -apple-system, sans-serif',
        }
      },
        React.createElement('div', { style: { flex: 1, position: 'relative', overflow: 'hidden' } },
          React.createElement('div', {
            style: {
              position: 'absolute', top: '50%', left: '50%',
              width, height, background: bgColor, overflow: 'hidden',
              transform: `translate(-50%, -50%) scale(${scale})`,
              transformOrigin: 'center center',
            }
          }, children)
        ),
        // 播放控制（`.no-record` class，錄影時會被隱藏）
        React.createElement('div', {
          className: 'no-record',
          style: {
            position: 'fixed', bottom: 0, left: 0, right: 0,
            background: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(10px)',
            padding: '12px 20px', display: 'flex', alignItems: 'center',
            gap: 16, color: '#fff', fontSize: 12, zIndex: 100,
          }
        },
          React.createElement('button', {
            style: { background: 'none', border: '1px solid rgba(255,255,255,0.3)', color: '#fff', padding: '6px 14px', borderRadius: 4, cursor: 'pointer' },
            onClick: () => setPlaying(p => !p)
          }, playing ? '⏸ 暫停' : '▶ 播放'),
          React.createElement('button', {
            style: { background: 'none', border: '1px solid rgba(255,255,255,0.3)', color: '#fff', padding: '6px 14px', borderRadius: 4, cursor: 'pointer' },
            onClick: () => setTime(0)
          }, '⏮ 開始'),
          React.createElement('div', { style: { fontFamily: 'JetBrains Mono, monospace', minWidth: 100 } },
            `${time.toFixed(2)}s / ${duration.toFixed(2)}s`),
          React.createElement('div', {
            style: { flex: 1, height: 4, background: 'rgba(255,255,255,0.2)', borderRadius: 2, position: 'relative', cursor: 'pointer' },
            onMouseDown: handleSeek
          },
            React.createElement('div', { style: { position: 'absolute', top: 0, left: 0, height: '100%', background: '#fb923c', borderRadius: 2, width: `${progress * 100}%`, pointerEvents: 'none' } }),
            React.createElement('div', { style: { position: 'absolute', top: '50%', width: 12, height: 12, background: '#fff', borderRadius: '50%', left: `${progress * 100}%`, transform: 'translate(-50%, -50%)', pointerEvents: 'none' } })
          )
        )
      )
    );
  }

  function Sprite({ start = 0, end, children, style }) {
    const { time } = useContext(TimeContext);
    const actualEnd = end == null ? Infinity : end;
    if (time < start || time >= actualEnd) return null;
    const duration = actualEnd - start;
    const elapsed = time - start;
    const t = duration === 0 ? 1 : Math.max(0, Math.min(1, elapsed / duration));
    const spriteValue = { t, elapsed, duration, start, end: actualEnd };
    return React.createElement(SpriteContext.Provider, { value: spriteValue },
      React.createElement('div', { style: { position: 'absolute', inset: 0, ...style } }, children)
    );
  }

  window.Animations = { Stage, Sprite, useTime, useSprite, Easing, interpolate };
})();
</script>

// ============================================================
// Scene 1 (0–4s)：Logo + 標題入場
// ============================================================
function Scene1_Opening() {
  const { t, elapsed } = useSprite();
  // 階段 1：Logo 從下淡入（0–1.2s）
  const logoOpacity = interpolate(elapsed, [0.1, 1.2], [0, 1], Easing.expoOut);
  const logoY = interpolate(elapsed, [0.1, 1.2], [30, 0], Easing.expoOut);
  // 階段 2：主標題（0.8–2.0s）
  const titleOpacity = interpolate(elapsed, [0.8, 2.0], [0, 1], Easing.expoOut);
  const titleY = interpolate(elapsed, [0.8, 2.0], [40, 0], Easing.expoOut);
  // 階段 3：副標題（1.6–2.8s）
  const subOpacity = interpolate(elapsed, [1.6, 2.8], [0, 1], Easing.expoOut);
  // 階段 4：分隔線繪出（2.2–3.2s）
  const lineScale = interpolate(elapsed, [2.2, 3.2], [0, 1], Easing.easeInOut);

  return (
    <div style={{
      position: 'absolute', inset: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      padding: '80px',
    }}>
      <div style={{ opacity: logoOpacity, transform: `translateY(${logoY}px)`, marginBottom: 64 }}>
        <AarkLogo size={72} />
      </div>

      <div style={{
        width: 320, height: 1,
        background: 'linear-gradient(90deg, transparent 0%, rgba(249,115,22,0.6) 50%, transparent 100%)',
        transform: `scaleX(${lineScale})`, marginBottom: 48,
      }} />

      <h1 style={{
        opacity: titleOpacity, transform: `translateY(${titleY}px)`,
        fontSize: 152, fontWeight: 900, letterSpacing: '-0.03em',
        margin: 0, textAlign: 'center', lineHeight: 1.05,
      }} className="text-gradient-orange">
        讓&nbsp;AI&nbsp;看見你
      </h1>

      <p style={{
        opacity: subOpacity,
        fontSize: 28, fontWeight: 400, color: 'rgba(255,255,255,0.72)',
        marginTop: 32, letterSpacing: '0.06em', textAlign: 'center',
      }}>
        AI&nbsp;能見度儀表板 · 檢測你的網站在&nbsp;ChatGPT、Perplexity、Google&nbsp;AI&nbsp;的被看見程度
      </p>

}

// ============================================================
// Scene 2 (4–10s)：痛點 — AI 搜尋結果裡出現競品，你卻不見了
// ============================================================
function Scene2_Problem() {
  const { elapsed } = useSprite();
  // Chat 視窗淡入
  const chatOpacity = interpolate(elapsed, [0, 0.8], [0, 1], Easing.expoOut);
  // 提問打字效果（0.3–1.8s）
  const question = '請推薦台灣的數位行銷公司';
  const typed = Math.floor(interpolate(elapsed, [0.3, 1.8], [0, question.length], Easing.linear));
  const questionShown = question.slice(0, typed);
  // Thinking 顯示（1.8–2.8s）
  const thinkingOpacity = interpolate(elapsed, [1.8, 2.2], [0, 1]) - interpolate(elapsed, [2.8, 3.1], [0, 1]);
  // 答案 3 個競品逐一浮現（3.0, 3.4, 3.8s）
  const competitors = [
    { name: 'Pitchup Media', desc: '擅長品牌策略 + SEO' },
    { name: 'Greenwave Digital', desc: 'GA4 / GSC 實戰經驗' },
    { name: 'Novadesign Studio', desc: 'B2B 內容行銷專家' },
  ];
  // 你的品牌被劃掉（4.8–5.5s）
  const youOpacity = interpolate(elapsed, [4.4, 5.0], [0, 1], Easing.expoOut);
  const strikeScale = interpolate(elapsed, [5.2, 5.8], [0, 1], Easing.easeInOut);
  // 痛點文字（5.6s+）
  const painOpacity = interpolate(elapsed, [5.4, 5.9], [0, 1], Easing.expoOut);

  return (
    <div style={{
      position: 'absolute', inset: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '80px',

      <div className="glass-dark" style={{

            <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#f59e0b' }} />
            <div style={{ width: 12, height: 12, borderRadius: '50%', background: '#10b981' }} />

            marginLeft: 16, padding: '6px 14px', borderRadius: 8,

          }}>
            {questionShown}
            {typed < question.length && <span style={{ opacity: (Math.floor(elapsed * 3) % 2) ? 1 : 0.2 }}>｜</span>}

        </div>

        <AarkLogo size={80} />
      </div>

      <h1 style={{
        opacity: titleOpacity, transform: `translateY(${titleY}px)`,
        fontSize: 120, fontWeight: 900, margin: 0, letterSpacing: '-0.03em',
        lineHeight: 1.05, textAlign: 'center',
      }} className="text-gradient-orange">
        讓&nbsp;AI&nbsp;看見你
      </h1>

      <p style={{
        opacity: titleOpacity, transform: `translateY(${titleY}px)`,
        fontSize: 28, color: 'rgba(255,255,255,0.7)',
        marginTop: 24, letterSpacing: '0.04em', textAlign: 'center',
      }}>
        從今天起，讓你的品牌在 AI 搜尋時代不再隱形
      </p>

      <button style={{
        opacity: ctaOpacity, transform: `scale(${ctaScale})`,
        marginTop: 56,
        padding: '24px 72px', borderRadius: 20,
        background: 'linear-gradient(135deg, #fb923c 0%, #f97316 100%)',
        border: 'none', color: '#fff',
        fontSize: 32, fontWeight: 700, letterSpacing: '0.05em',
        cursor: 'pointer',
        boxShadow: `0 16px 48px rgba(249,115,22,${0.35 + glowPulse * 0.35}), 0 0 ${40 + glowPulse * 40}px rgba(249,115,22,${glowPulse * 0.5})`,
      }}>
        立即免費檢測 →
      </button>

      <div style={{
        opacity: urlOpacity,
        marginTop: 40,
        display: 'flex', alignItems: 'center', gap: 12,
      }}>
        <div style={{ width: 40, height: 1, background: 'rgba(255,255,255,0.3)' }} />
        <div className="mono" style={{
          fontSize: 20, color: 'rgba(255,255,255,0.8)', letterSpacing: '0.1em',
        }}>
          aark-workspace.vercel.app
        </div>
        <div style={{ width: 40, height: 1, background: 'rgba(255,255,255,0.3)' }} />
      </div>
    </div>
  );
}

function App() {
  return (
    <Stage duration={36} width={1920} height={1080} bgColor="#000" loop={true}>
      <DarkBackground />

      <Sprite start={0}     end={4.2}>  <Scene1_Opening /></Sprite>
      <Sprite start={4.0}   end={10.2}> <Scene2_Problem /></Sprite>
      <Sprite start={10.0}  end={18.2}> <Scene3_Scanning /></Sprite>
      <Sprite start={18.0}  end={26.2}> <Scene4_Scores /></Sprite>
      <Sprite start={26.0}  end={32.2}> <Scene5_Fix /></Sprite>
      <Sprite start={32.0}  end={36.0}> <Scene6_CTA /></Sprite>

  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
